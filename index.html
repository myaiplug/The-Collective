<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>THE COLLECTIVE | Creative Culture, Engineered</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Fonts: Antonio (Tall/Condensed Headers), Inter (UI), JetBrains Mono (Technical/Code) -->
    <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@300;400;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Antonio', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              accent: {
                cyan: '#00f0ff',
                purple: '#7000ff',
                dim: '#1a1a1a',
              },
              ui: {
                bg: '#050505',
                card: '#0a0a0a',
                border: '#ffffff1a', // 10% white
              }
            },
            backgroundImage: {
              'noise': "url(\"data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.07'/%3E%3C/svg%3E\")",
            }
          }
        }
      }
    </script>
    <style>
      /* Custom Scrollbar for Plugin Feel */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #050505; 
      }
      ::-webkit-scrollbar-thumb {
        background: #333; 
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #555; 
      }
      body {
        background-color: #050505;
        color: #e5e5e5;
      }
      /* Global Vignette */
      .vignette {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.4) 100%);
        pointer-events: none;
        z-index: 50;
      }
      .font-stretch-condensed {
        font-stretch: condensed;
      }
      /* Audio Bar Animation */
      @keyframes equalizer {
        0% { height: 20%; }
        50% { height: 100%; }
        100% { height: 20%; }
      }
      .audio-bar {
        animation: equalizer 0.8s ease-in-out infinite;
      }
      .audio-bar:nth-child(odd) { animation-duration: 0.6s; }
      .audio-bar:nth-child(2) { animation-delay: 0.1s; }
      .audio-bar:nth-child(4) { animation-delay: 0.2s; }
      
      .paused .audio-bar {
        animation-play-state: paused;
        height: 20%;
        transition: height 0.3s ease;
      }
      @keyframes sweep {
        0% { transform: rotate(0deg) scale(1.5); }
        50% { transform: rotate(180deg) scale(1.8); }
        100% { transform: rotate(360deg) scale(1.5); }
      }
      .animate-sweep {
        animation: sweep 20s linear infinite;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.574.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <div class="vignette"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
